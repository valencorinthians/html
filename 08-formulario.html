<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario em HTML 5</title>
</head>
<body>
  <h1>formulario em html 5</h1> 
  <h3>cadastro de novo usuario</h3> 

  <form action="">
    <label for="Nome">Nome completo</label>
    <br>
    <input 
        type="text" 
        name="Nome" 
        id="Nome"
        placeholder="Digite seu nome"
        required
    >
    <br><br>
    <label for="email">Email</label>
    <br>
    <input 
        type="email" 
        name="Email" 
        id="Email"
        placeholder="Digite seu e-mail"
        required
        >
        <br><br>
        <label for="Senha">Senha</label>
        <br>
        <input 
        type="password" 
        name="Senha" 
        id="Senha"
        placeholder="Digite sua senha"
        required
        >
        <br><br>
        <label for="Data-nascimento">Data de nascimento</label>
        <br>
        <input 
        type="date" 
        name="Data-nascimento" 
        id="Data-nascimento"
        required
        >
        <br><br>
        <label for="Genero">Genero</label>
        <br>
        <input 
        type="radio" 
        name="Genero" 
        id="Genero">
        <label for="masculino">masculino</label>

        <input 
        type="radio" 
        name="Genero" 
        id="Genero">
        <label for="feminino">feminino</label>
    
  </form>
</body>
</html>
